<!-- HEADER -->
<header>
  <h1>Title</h1>
  <button>+ Lägg till användare</button>
</header>

<!-- MAIN CONTAINER -->
<main class="container">
  <!-- LEFT COLUMN -->
  <div class="left">
    <!-- FORM -->
    <form id="userForm">
      <h2 id="formTitle">Form Title</h2>
      <input type="hidden" id="userId" />
      <div><label>Förnamn</label><input id="firstName" /></div>
      <div><label>Efternamn</label><input id="lastName" /></div>
      <div><label>Användarnamn</label><input id="username" /></div>
      <div><label>Avatar-URL</label><input id="imageUrl" /></div>
      <div>
        <label>Kategori</label
        ><select id="category">
          ...
        </select>
      </div>
      <div class="form-actions">
        <button type="submit">Spara</button>
        <button type="reset">Återställ</button>
        <button type="button" onclick="cancelEdit()">Avbryt</button>
      </div>
    </form>

    <!-- USER DETAILS CARD -->
    <div id="userDetails" class="user-card">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- RIGHT COLUMN (User List) -->
  <div class="right" id="userListContainer">
    <!-- Rendered by JS -->
  </div>

  <ul class="user-list">
    <li class="user-list-item" data-user-id="0">
      <span class="user-name">Anna Andersson</span>
      <span class="user-username">@anna_a</span>
      <span class="user-category">admin</span>
    </li>
  </ul>
  <div class="user-card-header">
    <div class="user-avatar">AA</div>
    <div class="user-info">
      <h3 class="user-name">Anna Andersson</h3>
      <p class="user-username">@anna_a</p>
      <span class="user-category">admin</span>
    </div>
  </div>
  <div class="user-card-body">
    <div class="user-detail"><span>Förnamn</span><span>Anna</span></div>
    <div class="user-detail"><span>Efternamn</span><span>Andersson</span></div>
    <div class="user-detail"><span>Användarnamn</span><span>anna_a</span></div>
  </div>
  <div class="user-card-actions">
    <button onclick="editUser(0)">Redigera</button>
    <button onclick="deleteUser(0)">Radera</button>
  </div>
</main>
