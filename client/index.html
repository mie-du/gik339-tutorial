<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Användarformulär</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Användarformulär</h1>
    <main class="container">
      <div class="left">
        <form id="userForm" class="collapsible">
          <input type="hidden" id="userId" name="userId" />
          <div>
            <label for="firstName">Förnamn</label>
            <input type="text" id="firstName" name="firstName" />
          </div>
          <div>
            <label for="lastName">Efternamn</label>
            <input type="text" id="lastName" name="lastName" />
          </div>
          <div>
            <label for="username">Användarnamn</label>
            <input type="text" id="username" name="username" />
          </div>
          <div>
            <label for="imageUrl">Bild-URL (avatar)</label>
            <input type="url" id="imageUrl" name="imageUrl" placeholder="https://example.com/avatar.jpg" />
          </div>
          <div>
            <label for="category">Kategori</label>
            <select id="category" name="category">
              <option value="admin">Administratör</option>
              <option value="member">Medlem</option>
              <option value="guest">Gäst</option>
              <option value="moderator">Moderator</option>
              <option value="subscriber">Prenumerant</option>
            </select>
          </div>
          <div>
            <button type="submit">Skicka</button>
            <button type="reset">Återställ</button>
            <button type="button" onclick="cancelEdit()">Avbryt</button>
          </div>
        </form>
        <div class="user-card" id="userDetails"></div>
      </div>
      <div class="right user-list" id="userListContainer"></div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
