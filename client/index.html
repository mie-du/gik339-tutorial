<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Användarhantering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen text-white">
    <header class="page-header max-w-6xl mx-auto px-6 py-8 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-white">Användarhantering</h1>
      <button
        type="button"
        class="btn btn-add bg-emerald-500 hover:bg-emerald-600 text-white font-semibold px-4 py-2 rounded-lg transition"
        onclick="addUser()">
        + Lägg till användare
      </button>
    </header>

    <main class="container max-w-6xl mx-auto px-6 pb-8 flex flex-wrap gap-8">
      <div class="left flex-1 min-w-[300px]">
        <form
          id="userForm"
          class="hidden bg-white/10 backdrop-blur-md rounded-xl border border-white/20 p-6 space-y-4 mb-6">
          <h2 id="formTitle" class="text-xl font-bold text-white">Lägg till användare</h2>
          <input type="hidden" id="userId" name="userId" />
          <div class="form-group">
            <label for="firstName" class="block text-sm font-semibold text-white/80 mb-1">Förnamn</label>
            <input
              type="text"
              id="firstName"
              name="firstName"
              class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div class="form-group">
            <label for="lastName" class="block text-sm font-semibold text-white/80 mb-1">Efternamn</label>
            <input
              type="text"
              id="lastName"
              name="lastName"
              class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div class="form-group">
            <label for="username" class="block text-sm font-semibold text-white/80 mb-1">Användarnamn</label>
            <input
              type="text"
              id="username"
              name="username"
              class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div class="form-group">
            <label for="imageUrl" class="block text-sm font-semibold text-white/80 mb-1">Avatar-URL</label>
            <input
              type="url"
              id="imageUrl"
              name="imageUrl"
              placeholder="https://example.com/avatar.jpg"
              class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
          <div class="form-group">
            <label for="category" class="block text-sm font-semibold text-white/80 mb-1">Kategori</label>
            <select
              id="category"
              name="category"
              class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-400">
              <option value="admin" class="bg-slate-900">Administratör</option>
              <option value="member" class="bg-slate-900">Medlem</option>
              <option value="guest" class="bg-slate-900">Gäst</option>
              <option value="moderator" class="bg-slate-900">Moderator</option>
              <option value="subscriber" class="bg-slate-900">Prenumerant</option>
            </select>
          </div>
          <div class="form-actions flex gap-3 pt-4">
            <button
              type="submit"
              class="btn btn-primary flex-1 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition">
              Spara
            </button>
            <button
              type="reset"
              class="btn btn-secondary flex-1 bg-white/20 hover:bg-white/30 text-white font-semibold py-2 rounded-lg transition">
              Återställ
            </button>
            <button
              type="button"
              class="btn btn-danger flex-1 bg-red-500/20 hover:bg-red-500/30 text-red-300 font-semibold py-2 rounded-lg transition"
              onclick="cancelEdit()">
              Avbryt
            </button>
          </div>
        </form>
        <div
          id="userDetails"
          class="user-card bg-white/10 backdrop-blur-md rounded-xl border border-white/20 p-6"></div>
      </div>
      <div class="right flex-[2] min-w-[300px]">
        <div
          id="userListContainer"
          class="user-list bg-white/10 backdrop-blur-md rounded-xl border border-white/20 p-6"></div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
