<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Användarhantering</title>
    <!-- Fix så att error om favicon försvinner i firefox -->
    <link rel="icon" type="image/x-icon" href="#" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Användarhantering</h1>
      <button type="button" class="btn btn-add">
        <span>+</span>
        <span>Lägg till användare</span>
      </button>
    </header>
    <!-- 2-kolumnslayout - vänster (formulär) -->
    <main class="container">
      <div class="left">
        <form id="userForm" class="hidden">
          <h2 id="formTitle">Lägg till användare</h2>
          <input type="hidden" id="userId" name="userId" />
          <div class="form-group">
            <label for="firstName">Förnamn</label>
            <input type="text" id="firstName" name="firstName" />
          </div>
          <div class="form-group">
            <label for="lastName">Efternamn</label>
            <input type="text" id="lastName" name="lastName" />
          </div>
          <div class="form-group">
            <label for="username">Användarnamn</label>
            <input type="text" id="username" name="username" />
          </div>
          <div class="form-group">
            <label for="imageUrl">Avatar-URL</label>
            <input
              type="url"
              id="imageUrl"
              name="imageUrl"
              placeholder="https://example.com/avatar.jpg" />
          </div>
          <div class="form-group">
            <label for="category">Kategori</label>
            <select id="category" name="category">
              <option value="admin">Administratör</option>
              <option value="member">Medlem</option>
              <option value="guest">Gäst</option>
              <option value="moderator">Moderator</option>
              <option value="subscriber">Prenumerant</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Spara</button>
            <button type="reset" class="btn btn-secondary">Återställ</button>
            <button type="button" class="btn btn-danger">Avbryt</button>
          </div>
        </form>
        <div id="userDetails" class="hidden user-card"></div>
      </div>
      <!-- 2-kolumnslayout - höger (lista av användare på sikt) -->
      <div class="right">
        <div id="userListContainer" class="user-list"></div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
