<!doctype html>
<html lang="sv" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Användarregistrering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-dark text-light min-vh-100">
    <div class="container py-4">
      <header class="d-flex justify-content-between align-items-center mb-5 pb-4 border-bottom border-secondary">
        <h1 class="display-6 mb-0">👥 Användarhantering</h1>
        <button type="button" class="btn btn-success" onclick="addUser()">+ Lägg till användare</button>
      </header>

      <!-- Form Section - Full width on top -->
      <form id="userForm" class="d-none mb-5">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6">
            <div class="bg-body-tertiary rounded-4 p-4">
              <h4 id="formTitle" class="mb-4 text-center">Lägg till användare</h4>
              <input type="hidden" id="userId" name="userId" />
              <div class="row g-3">
                <div class="col-sm-6">
                  <label for="firstName" class="form-label text-secondary">Förnamn</label>
                  <input type="text" class="form-control form-control-lg" id="firstName" name="firstName" />
                </div>
                <div class="col-sm-6">
                  <label for="lastName" class="form-label text-secondary">Efternamn</label>
                  <input type="text" class="form-control form-control-lg" id="lastName" name="lastName" />
                </div>
                <div class="col-sm-6">
                  <label for="username" class="form-label text-secondary">Användarnamn</label>
                  <input type="text" class="form-control form-control-lg" id="username" name="username" />
                </div>
                <div class="col-sm-6">
                  <label for="category" class="form-label text-secondary">Kategori</label>
                  <select class="form-select form-select-lg" id="category" name="category">
                    <option value="admin">Administratör</option>
                    <option value="member">Medlem</option>
                    <option value="guest">Gäst</option>
                    <option value="moderator">Moderator</option>
                    <option value="subscriber">Prenumerant</option>
                  </select>
                </div>
                <div class="col-12">
                  <label for="imageUrl" class="form-label text-secondary">Avatar-URL</label>
                  <input
                    type="url"
                    class="form-control"
                    id="imageUrl"
                    name="imageUrl"
                    placeholder="https://example.com/avatar.jpg" />
                </div>
                <div class="col-12 d-flex gap-2 justify-content-center pt-3">
                  <button type="submit" class="btn btn-success px-4">Spara</button>
                  <button type="reset" class="btn btn-outline-secondary">Återställ</button>
                  <button type="button" class="btn btn-outline-danger" onclick="cancelEdit()">Avbryt</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </form>

      <!-- User Details - Centered card -->
      <div id="userDetails" class="mb-5"></div>

      <!-- Users List Section - Full width table style -->
      <section>
        <div id="userListContainer" class="bg-body-tertiary rounded-4 overflow-hidden"></div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
